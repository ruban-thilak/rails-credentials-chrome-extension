<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gem" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="45%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </linearGradient>
    <radialGradient id="eyeShine" cx="0.35" cy="0.3" r="0.5">
      <stop offset="0%" stop-color="#666"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </radialGradient>
  </defs>

  <!-- === GEM BODY (lower portion) === -->
  <polygon points="28,48 100,48 120,72 64,124 8,72" fill="url(#gem)"/>

  <!-- Facet highlights -->
  <line x1="28" y1="48" x2="8" y2="72" stroke="#fecaca" stroke-width="1.5" opacity="0.5"/>
  <line x1="100" y1="48" x2="120" y2="72" stroke="#fecaca" stroke-width="1.5" opacity="0.5"/>
  <line x1="8" y1="72" x2="120" y2="72" stroke="#7f1d1d" stroke-width="1.2" opacity="0.3"/>
  <line x1="28" y1="48" x2="64" y2="124" stroke="#7f1d1d" stroke-width="1" opacity="0.15"/>
  <line x1="100" y1="48" x2="64" y2="124" stroke="#7f1d1d" stroke-width="1" opacity="0.15"/>
  <line x1="28" y1="48" x2="100" y2="48" stroke="#fee2e2" stroke-width="1.5" opacity="0.5"/>

  <!-- === CAT EARS (behind the head) === -->
  <!-- Left ear outer (white) -->
  <polygon points="28,52 42,10 56,50" fill="#ffffff"/>
  <!-- Left ear inner (pink) -->
  <polygon points="34,48 43,18 52,48" fill="#fca5a5"/>

  <!-- Right ear outer (white) -->
  <polygon points="72,50 86,10 100,52" fill="#ffffff"/>
  <!-- Right ear inner (pink) -->
  <polygon points="76,48 85,18 94,48" fill="#fca5a5"/>

  <!-- === CAT FACE === -->
  <ellipse cx="64" cy="60" rx="32" ry="28" fill="#ffffff"/>

  <!-- === EYES (big anime style) === -->
  <!-- Left eye -->
  <ellipse cx="50" cy="58" rx="8" ry="9" fill="url(#eyeShine)"/>
  <!-- Left eye highlight (big) -->
  <ellipse cx="47" cy="54" rx="3" ry="3.5" fill="#ffffff" opacity="0.9"/>
  <!-- Left eye highlight (small) -->
  <circle cx="53" cy="61" r="1.5" fill="#ffffff" opacity="0.6"/>

  <!-- Right eye -->
  <ellipse cx="78" cy="58" rx="8" ry="9" fill="url(#eyeShine)"/>
  <!-- Right eye highlight (big) -->
  <ellipse cx="75" cy="54" rx="3" ry="3.5" fill="#ffffff" opacity="0.9"/>
  <!-- Right eye highlight (small) -->
  <circle cx="81" cy="61" r="1.5" fill="#ffffff" opacity="0.6"/>

  <!-- === NOSE === -->
  <ellipse cx="64" cy="67" rx="2.5" ry="1.8" fill="#f9a8b8"/>

  <!-- === MOUTH (w-shape) === -->
  <path d="M58 71 Q61 74 64 71 Q67 74 70 71" stroke="#d4a0a0" stroke-width="1.3" fill="none" stroke-linecap="round"/>

  <!-- === BLUSH MARKS === -->
  <ellipse cx="40" cy="66" rx="5" ry="3" fill="#fca5a5" opacity="0.45"/>
  <ellipse cx="88" cy="66" rx="5" ry="3" fill="#fca5a5" opacity="0.45"/>

  <!-- === WHISKERS === -->
  <!-- Left whiskers -->
  <line x1="20" y1="58" x2="38" y2="62" stroke="#d4a0a0" stroke-width="0.8" opacity="0.4"/>
  <line x1="18" y1="64" x2="37" y2="66" stroke="#d4a0a0" stroke-width="0.8" opacity="0.4"/>
  <line x1="20" y1="70" x2="38" y2="68" stroke="#d4a0a0" stroke-width="0.8" opacity="0.4"/>
  <!-- Right whiskers -->
  <line x1="108" y1="58" x2="90" y2="62" stroke="#d4a0a0" stroke-width="0.8" opacity="0.4"/>
  <line x1="110" y1="64" x2="91" y2="66" stroke="#d4a0a0" stroke-width="0.8" opacity="0.4"/>
  <line x1="108" y1="70" x2="90" y2="68" stroke="#d4a0a0" stroke-width="0.8" opacity="0.4"/>
</svg>