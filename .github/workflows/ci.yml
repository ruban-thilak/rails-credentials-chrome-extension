name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test

  validate-manifest:
    name: Validate Manifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check manifest.json is valid JSON
        run: node -e "JSON.parse(require('fs').readFileSync('manifest.json','utf8'))"
      - name: Validate required manifest fields
        run: |
          node -e "
            const m = JSON.parse(require('fs').readFileSync('manifest.json','utf8'));
            const required = ['manifest_version','name','version','description','permissions'];
            const missing = required.filter(k => !(k in m));
            if (missing.length) { console.error('Missing fields:', missing); process.exit(1); }
            if (m.manifest_version !== 3) { console.error('Expected MV3'); process.exit(1); }
            if (!/^\d+\.\d+\.\d+$/.test(m.version)) { console.error('Invalid semver:', m.version); process.exit(1); }
            console.log('Manifest OK:', m.name, 'v' + m.version);
          "
      - name: Verify all referenced files exist
        run: |
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('manifest.json','utf8'));
            const files = new Set();
            if (m.background?.service_worker) files.add(m.background.service_worker);
            if (m.action?.default_popup) files.add(m.action.default_popup);
            for (const s of Object.values(m.action?.default_icon || {})) files.add(s);
            for (const s of Object.values(m.icons || {})) files.add(s);
            for (const cs of m.content_scripts || []) {
              for (const f of cs.js || []) files.add(f);
              for (const f of cs.css || []) files.add(f);
            }
            const missing = [...files].filter(f => !fs.existsSync(f));
            if (missing.length) { console.error('Missing files:', missing); process.exit(1); }
            console.log('All', files.size, 'referenced files exist');
          "

  build:
    name: Build Extension Zip
    runs-on: ubuntu-latest
    needs: [lint, test, validate-manifest]
    steps:
      - uses: actions/checkout@v4
      - name: Build zip
        run: ./package.sh
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-zip
          path: dist/*.zip
          retention-days: 30
